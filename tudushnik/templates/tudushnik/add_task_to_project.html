{% extends 'tudushnik/base.html' %}
{% load static %}

{% block local_styles %}
    <link rel="stylesheet" href="{% static 'tudushnik/css/form.css' %}">
{% endblock local_styles %}

{% block content %}
    <h2>{{ title }}</h2>
    <form action="{% url 'add_task_to_project' project_pk=form.initial.project %}" class="form" method="post"
          enctype="multipart/form-data">
        {% include 'tudushnik/_add_task_form_content.html' %}
    </form>
{% endblock content %}

{% block local_scripts %}
    <script type="text/javascript"
            src="{% static 'tudushnik/js/dist/task_update_form.js' %}"></script>
{% endblock local_scripts %}
